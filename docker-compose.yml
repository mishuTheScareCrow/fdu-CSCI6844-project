services:
  customerservice:
    container_name: customerservice
    build:
      context: ./CustomerService
      dockerfile: Dockerfile
    ports:
      - "5001:8080"

  productservice:
    container_name: productservice
    build:
      context: ./ProductService
      dockerfile: Dockerfile
    ports:
      - "5002:8080"

  orderservice:
    container_name: orderservice
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    ports:
      - "5003:8080"
    environment:
      ServiceUrls__CustomerService: http://customerservice:8080/
      ServiceUrls__ProductService: http://productservice:8080/
    depends_on:
      - customerservice
      - productservice

  paymentservice:
    container_name: paymentservice
    build:
      context: ./PaymentService
      dockerfile: Dockerfile
    ports:
      - "5004:8080"
